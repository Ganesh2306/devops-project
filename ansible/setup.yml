- hosts: appserver
  become: yes

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - wget
          - gnupg
        state: present

    - name: Add Microsoft package repository
      shell: |
        wget https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb -O packages-microsoft-prod.deb
        dpkg -i packages-microsoft-prod.deb

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install .NET runtime
      apt:
        name: aspnetcore-runtime-8.0
        state: present

    - name: Create app directory
      file:
        path: /var/www/dotnet-app
        state: directory

    - name: Copy published app
      copy:
        src: ../app/dotnet-app/publish/
        dest: /var/www/dotnet-app/

    - name: Run application
      shell: |
        pkill dotnet || true
        cd /var/www/dotnet-app
        nohup dotnet dotnet-app.dll --urls "http://0.0.0.0:80" > app.log 2>&1 &      